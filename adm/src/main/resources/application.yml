# ADM 서비스 설정입니다.

spring:
  application:
    name: adm
  profiles:
    active: local
    include: pfw, cmn
  datasource:
    adm:
      driver-class-name: ${ADM_DB_DRIVER:org.mariadb.jdbc.Driver}
      url: ${ADM_DB_URL:jdbc:mariadb://localhost:3306/admDB}
      username: ${ADM_DB_USERNAME:cpf_adm_app}
      password: ${ADM_DB_PASSWORD:cpf_local_pw}
    mbr:
      driver-class-name: ${MBR_DB_DRIVER:org.mariadb.jdbc.Driver}
      url: ${MBR_DB_URL:jdbc:mariadb://localhost:3306/mbrDB}
      username: ${MBR_DB_USERNAME:cpf_mbr_app}
      password: ${MBR_DB_PASSWORD:cpf_local_pw}
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

server:
  port: ${ADM_SERVER_PORT:8090}

logging:
  level:
    root: INFO
    cpf.pfw: INFO
    cpf.cmn: INFO
    cpf.adm: DEBUG

cpf:
  framework:
    module-id: ADM
    was-id: ${WAS_ID:admAP01}
  adm:
    security:
      enabled: ${CPF_ADM_SECURITY_ENABLED:${FPS_ADM_SECURITY_ENABLED:true}}
      session-ttl-seconds: ${CPF_ADM_SESSION_TTL_SECONDS:${FPS_ADM_SESSION_TTL_SECONDS:3600}}
      ip-allowlist: ${CPF_ADM_IP_ALLOWLIST:}
      mfa-enabled: ${CPF_ADM_MFA_ENABLED:false}
      session-cleanup-cron: ${CPF_ADM_SESSION_CLEANUP_CRON:0 */10 * * * *}
    password-policy:
      expire-days: ${CPF_ADM_PASSWORD_EXPIRE_DAYS:${FPS_ADM_PASSWORD_EXPIRE_DAYS:90}}
      min-length: ${CPF_ADM_PASSWORD_MIN_LENGTH:${FPS_ADM_PASSWORD_MIN_LENGTH:10}}
      required-category-count: ${CPF_ADM_PASSWORD_REQUIRED_CATEGORY_COUNT:${FPS_ADM_PASSWORD_REQUIRED_CATEGORY_COUNT:3}}
      max-fail-count: ${CPF_ADM_PASSWORD_MAX_FAIL_COUNT:${FPS_ADM_PASSWORD_MAX_FAIL_COUNT:5}}
      history-count: ${CPF_ADM_PASSWORD_HISTORY_COUNT:${FPS_ADM_PASSWORD_HISTORY_COUNT:3}}

---
# prod에서는 DB password 같은 secret 기본값을 두지 않고 배포 환경변수 또는 Vault/KMS 연동 값으로만 주입합니다.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    adm:
      url: ${ADM_DB_URL}
      username: ${ADM_DB_USERNAME}
      password: ${ADM_DB_PASSWORD}
    mbr:
      url: ${MBR_DB_URL}
      username: ${MBR_DB_USERNAME}
      password: ${MBR_DB_PASSWORD}

logging:
  level:
    cpf.adm: INFO
