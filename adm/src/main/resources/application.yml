# ADM service configuration.

spring:
  application:
    name: adm
  profiles:
    active: local
    include: pfw, cmn
  datasource:
    adm:
      driver-class-name: ${ADM_DB_DRIVER:org.mariadb.jdbc.Driver}
      url: ${ADM_DB_URL:jdbc:mariadb://localhost:3306/admDB}
      username: ${ADM_DB_USERNAME:root}
      password: ${ADM_DB_PASSWORD:}

server:
  port: ${ADM_SERVER_PORT:8090}

logging:
  level:
    root: INFO
    cpf.pfw: INFO
    cpf.cmn: INFO
    cpf.adm: DEBUG

cpf:
  framework:
    module-id: ADM
    was-id: ${WAS_ID:admAP01}
  adm:
    security:
      enabled: ${CPF_ADM_SECURITY_ENABLED:${FPS_ADM_SECURITY_ENABLED:true}}
      session-ttl-seconds: ${CPF_ADM_SESSION_TTL_SECONDS:${FPS_ADM_SESSION_TTL_SECONDS:3600}}
    password-policy:
      expire-days: ${CPF_ADM_PASSWORD_EXPIRE_DAYS:${FPS_ADM_PASSWORD_EXPIRE_DAYS:90}}
      min-length: ${CPF_ADM_PASSWORD_MIN_LENGTH:${FPS_ADM_PASSWORD_MIN_LENGTH:10}}
      required-category-count: ${CPF_ADM_PASSWORD_REQUIRED_CATEGORY_COUNT:${FPS_ADM_PASSWORD_REQUIRED_CATEGORY_COUNT:3}}
      max-fail-count: ${CPF_ADM_PASSWORD_MAX_FAIL_COUNT:${FPS_ADM_PASSWORD_MAX_FAIL_COUNT:5}}
      history-count: ${CPF_ADM_PASSWORD_HISTORY_COUNT:${FPS_ADM_PASSWORD_HISTORY_COUNT:3}}

