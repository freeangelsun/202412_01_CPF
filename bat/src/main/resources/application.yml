spring:
  config:
    import:
      - optional:classpath:application-pfw.yml
      - optional:classpath:application-pfw-${spring.profiles.active:local}.yml
      - optional:classpath:application-cmn.yml
      - optional:classpath:application-cmn-${spring.profiles.active:local}.yml
      - optional:classpath:application-bat.yml
      - optional:classpath:application-bat-${spring.profiles.active:local}.yml
  application:
    name: bat
  profiles:
    active: local
    include: pfw
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

server:
  port: ${BAT_SERVER_PORT:8093}

logging:
  level:
    root: INFO
    cpf.pfw: INFO
    cpf.bat: DEBUG

cpf:
  framework:
    module-id: BAT
    was-id: ${WAS_ID:batWK01}
  bat:
    smoke:
      run-on-startup: ${CPF_BAT_SMOKE_RUN_ON_STARTUP:false}
      run-failure-on-startup: ${CPF_BAT_SMOKE_RUN_FAILURE_ON_STARTUP:false}
      heartbeat-iterations: ${CPF_BAT_SMOKE_HEARTBEAT_ITERATIONS:4}
      heartbeat-sleep-ms: ${CPF_BAT_SMOKE_HEARTBEAT_SLEEP_MS:1200}
  batch:
    worker:
      heartbeat-interval-seconds: ${CPF_BATCH_WORKER_HEARTBEAT_INTERVAL_SECONDS:2}
      heartbeat-timeout-seconds: ${CPF_BATCH_WORKER_HEARTBEAT_TIMEOUT_SECONDS:10}
    ghost-detection:
      enabled: ${CPF_BATCH_GHOST_DETECTION_ENABLED:true}
      interval-seconds: ${CPF_BATCH_GHOST_DETECTION_INTERVAL_SECONDS:30}

---
spring:
  config:
    activate:
      on-profile: prod

cpf:
  bat:
    smoke:
      run-on-startup: false
      run-failure-on-startup: false
