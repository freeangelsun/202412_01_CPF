spring:
  config:
    import:
      - optional:classpath:application-pfw.yml
      - optional:classpath:application-pfw-${spring.profiles.active:local}.yml
      - optional:classpath:application-cmn.yml
      - optional:classpath:application-cmn-${spring.profiles.active:local}.yml
      - optional:classpath:application-bizadm.yml
      - optional:classpath:application-bizadm-${spring.profiles.active:local}.yml
  application:
    name: bizadm
  profiles:
    include: pfw, cmn
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

server:
  port: ${BIZADM_SERVER_PORT:8091}

cpf:
  framework:
    module-id: BIZ
    was-id: ${WAS_ID:bizAP01}
  bizadm:
    datasource:
      enabled: ${CPF_BIZADM_DB_ENABLED:false}
      url: ${BIZADM_DB_URL:jdbc:mariadb://localhost:3306/bizadmDB}
      username: ${BIZADM_DB_USERNAME:cpf_bizadm_app}
      password: ${BIZADM_DB_PASSWORD:cpf_local_pw}
      driver-class-name: org.mariadb.jdbc.Driver
