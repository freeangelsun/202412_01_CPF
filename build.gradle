tasks.register('checkPackagedDependencies') {
    group = 'verification'
    description = 'CPF verification or deployment task.'
    def moduleCode = cpfRequestedModule()
    def moduleLower = cpfModuleProjectName(moduleCode)
    dependsOn ":${moduleLower}:bootJar"
    doLast {
        cpfCheckPackagedDependencies(moduleCode, cpfResultDir())
    }
}

tasks.register('remoteDeployDryRun') {
    group = 'verification'
    description = 'CPF verification or deployment task.'
    def moduleCode = cpfRequestedModule()
    def moduleLower = cpfModuleProjectName(moduleCode)
    dependsOn 'checkDeployEnv', 'checkDeployInventory', 'checkPackagedDependencies', ":${moduleLower}:bootJar"
    doLast {
        def env = cpfRequestedEnv()
        def resultDir = cpfResultDir()
        def envResult = cpfValidateDeployEnv(moduleCode, env, resultDir)
        def inventoryResult = cpfValidateDeployInventory(moduleCode, env, resultDir)
        def packageResult = cpfCheckPackagedDependencies(moduleCode, resultDir)
        def jarFile = project(":${moduleLower}").tasks.named('bootJar').get().archiveFile.get().asFile
        def target = inventoryResult.target
        def javaPlan = "java -jar ${jarFile.path.replace('\\', '/')} --spring.profiles.active=${env}"
        def externalWasPlan = [
                mode        : 'external-was',
                status      : 'CONFIG_PLAN_ONLY',
                datasource  : "${moduleCode}_DATASOURCE_MODE=jndi",
                jndiNameKey : "${moduleCode}_DATASOURCE_JNDI_NAME",
                runtimeCheck: 'External WAS and JNDI registration are not executed by this dry-run.'
        ]
        def result = [
                generatedAt       : new Date().format("yyyy-MM-dd'T'HH:mm:ss.SSSZ"),
                module            : moduleCode,
                env               : env,
                deployMode        : 'dryRun',
                status            : 'DONE',
                realRemoteExecuted: false,
                artifact          : packageResult.artifact,
                checksumSha256    : cpfSha256(jarFile),
                envEvidence       : envResult,
                inventoryEvidence : inventoryResult,
                javaJarCommandPlan: javaPlan,
                healthUrl         : target.healthUrl,
                runtimeMode       : target.runtimeMode,
                externalWasPlan   : externalWasPlan,
                rollbackExecuted  : false
        ]
        cpfWriteJson(new File(resultDir, "remote-deploy-dry-run-${moduleLower}-${env}.sanitized.json"), result)
        cpfWriteJson(new File(resultDir, "remote-deploy-dry-run.sanitized.json"), result)
    }
}

tasks.register('checkDeployDryRun') {
    group = 'verification'
    description = 'CPF verification or deployment task.'
    dependsOn 'remoteDeployDryRun'
}

tasks.register('remoteDeploy') {
    group = 'deployment'
    description = 'CPF verification or deployment task.'
    doLast {
        def moduleCode = cpfRequestedModule()
        def env = cpfRequestedEnv()
        def mode = (findProperty('cpfDeployMode') ?: 'remote').toString()
        def requireApproval = (findProperty('cpfRequireApproval') ?: 'true').toString().toBoolean()
        def result = [
                generatedAt       : new Date().format("yyyy-MM-dd'T'HH:mm:ss.SSSZ"),
                module            : moduleCode,
                env               : env,
                deployMode        : mode,
                requireApproval   : requireApproval,
                realRemoteExecuted: false,
                status            : 'FAILED',
                failureReason     : 'Real remote deployment is not executed because no approved remote target is configured.'
        ]
        cpfWriteJson(new File(cpfResultDir(), "remote-deploy-${cpfModuleProjectName(moduleCode)}-${env}.sanitized.json"), result)
        throw new GradleException(result.failureReason)
    }
}

tasks.register('rollbackDeploy') {
    group = 'deployment'
    description = 'CPF verification or deployment task.'
    doLast {
        def moduleCode = cpfRequestedModule()
        def env = cpfRequestedEnv()
        def result = [
                generatedAt       : new Date().format("yyyy-MM-dd'T'HH:mm:ss.SSSZ"),
                module            : moduleCode,
                env               : env,
                realRemoteExecuted: false,
                rollbackExecuted  : false,
                status            : 'FAILED',
                failureReason     : 'Real rollback is not executed because no approved remote target or rollback artifact is configured.'
        ]
        cpfWriteJson(new File(cpfResultDir(), "rollback-deploy-${cpfModuleProjectName(moduleCode)}-${env}.sanitized.json"), result)
        throw new GradleException(result.failureReason)
    }
}
