plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.13' apply false
    id 'io.spring.dependency-management' version '1.1.7' apply false
}

def cpfPlatformProperties = new Properties()
file('gradle/cpf-platform.properties').withInputStream { cpfPlatformProperties.load(it) }
ext.cpfPlatformVersion = cpfPlatformProperties.getProperty('platformVersion')
ext.cpfCompatibleRange = cpfPlatformProperties.getProperty('compatibleRange')

if (ext.cpfPlatformVersion == null || ext.cpfPlatformVersion.isBlank()) {
    throw new GradleException('gradle/cpf-platform.properties의 platformVersion은 필수입니다.')
}

allprojects { targetProject ->
    def componentVersion = cpfPlatformProperties.getProperty("component.${targetProject.name}", 'inherit')
    version = componentVersion == 'inherit' ? rootProject.ext.cpfPlatformVersion : componentVersion

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'io.spring.dependency-management'

    java {
        // CPF의 소스·컴파일·배포 바이트코드 기준을 Java 25 LTS 하나로 고정합니다.
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
        sourceCompatibility = JavaVersion.VERSION_25
        targetCompatibility = JavaVersion.VERSION_25
        withSourcesJar()
        withJavadocJar()
    }

    dependencyManagement {
        imports {
            mavenBom 'org.springframework.boot:spring-boot-dependencies:3.4.13'
        }
    }

    dependencies {
        compileOnly 'org.projectlombok:lombok:1.18.46'
        annotationProcessor 'org.projectlombok:lombok:1.18.46'
        testCompileOnly 'org.projectlombok:lombok:1.18.46'
        testAnnotationProcessor 'org.projectlombok:lombok:1.18.46'
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testImplementation 'net.bytebuddy:byte-buddy:1.18.7'
        testImplementation 'net.bytebuddy:byte-buddy-agent:1.18.7'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    }

    tasks.withType(JavaCompile).configureEach {
        // 실행 JDK와 무관하게 Java 25 API 및 class major 69 산출물만 허용합니다.
        options.release = 25
        options.encoding = 'UTF-8'
    }

    tasks.withType(Javadoc).configureEach {
        options.encoding = 'UTF-8'
        options.charSet = 'UTF-8'
        options.docEncoding = 'UTF-8'
        options.addStringOption('Xdoclint:all,-missing', '-quiet')
    }

    tasks.named('processResources').configure {
        doLast {
            def metadataDir = new File(destinationDir, 'META-INF')
            metadataDir.mkdirs()
            new File(metadataDir, 'cpf-platform.properties').setText(
                            "platformVersion=${rootProject.ext.cpfPlatformVersion}\n" +
                            "componentVersion=${project.version}\n" +
                            "compatibleRange=${rootProject.ext.cpfCompatibleRange}\n" +
                            "component=${project.name}\n",
                    'UTF-8')
        }
    }

    tasks.withType(AbstractArchiveTask).configureEach {
        archiveBaseName = project.name
        preserveFileTimestamps = false
        reproducibleFileOrder = true
    }

    tasks.withType(Jar).configureEach {
        manifest {
            attributes(
                    'Implementation-Title': project.name,
                    'Implementation-Version': project.version,
                    'CPF-Platform-Version': rootProject.ext.cpfPlatformVersion,
                    'CPF-Compatible-Range': rootProject.ext.cpfCompatibleRange,
                    'Git-Commit': providers.exec {
                        commandLine 'git', 'rev-parse', 'HEAD'
                        ignoreExitValue = true
                    }.standardOutput.asText.get().trim(),
                    'Build-Number': System.getenv('BUILD_NUMBER') ?: 'local',
                    'Build-Time': System.getenv('SOURCE_DATE_EPOCH') ?: 'reproducible-build',
                    'Artifact-Checksum': 'external-sha256'
            )
        }
    }
}

tasks.register('verifyVersionConsistency') {
    group = 'verification'
    description = '모든 CPF 모듈과 생성기의 제품 버전 정합성을 검사합니다.'
    doLast {
        def expected = rootProject.ext.cpfPlatformVersion.toString()
        if (!(expected ==~ /\d+\.\d+\.\d+(?:-SNAPSHOT|-rc\.\d+)?/)) {
            throw new GradleException("CPF platform version format is invalid: ${expected}")
        }
        ['cpf-core', 'cpf-common'].each { lockedComponent ->
            if (project(":${lockedComponent}").version.toString() != expected) {
                throw new GradleException("${lockedComponent} component must stay platform-locked: ${project(":${lockedComponent}").version}")
            }
        }
        subprojects.each { component ->
            def configured = cpfPlatformProperties.getProperty("component.${component.name}", 'inherit')
            def effective = configured == 'inherit' ? expected : configured
            if (component.version.toString() != effective) {
                throw new GradleException("CPF component version mismatch: ${component.path}=${component.version}, expected=${effective}")
            }
            if (!(effective ==~ /\d+\.\d+\.\d+(?:-SNAPSHOT|-rc\.\d+)?/)) {
                throw new GradleException("CPF component version format is invalid: ${component.path}=${effective}")
            }
        }
        def generatorText = file('scripts/create-domain.ps1').getText('UTF-8')
        if (generatorText.contains("version = '0.0.1-SNAPSHOT'")) {
            throw new GradleException('도메인 생성기에 구형 고정 버전이 남아 있습니다.')
        }
        logger.lifecycle("CPF version consistency passed: ${expected}")
    }
}

void cpfWriteVersionProperty(String key, String value) {
    def manifest = file('gradle/cpf-platform.properties')
    def lines = manifest.readLines('UTF-8')
    def replaced = false
    lines = lines.collect { line ->
        if (line.startsWith("${key}=")) {
            replaced = true
            return "${key}=${value}"
        }
        return line
    }
    if (!replaced) {
        lines << "${key}=${value}"
    }
    manifest.setText(lines.join(System.lineSeparator()) + System.lineSeparator(), 'UTF-8')
}

List<Integer> cpfParseSemanticVersion(String versionText) {
    def matcher = versionText =~ /^(\d+)\.(\d+)\.(\d+)/
    if (!matcher.find()) {
        throw new GradleException("Semantic version cannot be parsed: ${versionText}")
    }
    return [matcher.group(1).toInteger(), matcher.group(2).toInteger(), matcher.group(3).toInteger()]
}

tasks.register('bumpComponentVersion') {
    group = 'release'
    description = '승인된 구성요소의 독립 patch/minor/major 개발 버전을 계산해 정본에 반영합니다.'
    doLast {
        def component = (findProperty('component') ?: '').toString().trim()
        def level = (findProperty('level') ?: '').toString().trim().toLowerCase(Locale.ROOT)
        if (!subprojects*.name.contains(component)) {
            throw new GradleException("Unknown component: ${component}")
        }
        if (component in ['cpf-core', 'cpf-common']) {
            throw new GradleException("cpf-core와 cpf-common은 platform-locked component이므로 독립 version bump를 허용하지 않습니다.")
        }
        if (!(level in ['patch', 'minor', 'major'])) {
            throw new GradleException('level은 patch, minor 또는 major 중 하나여야 합니다.')
        }
        def current = project(":${component}").version.toString()
        def parts = cpfParseSemanticVersion(current)
        if (level == 'major') {
            parts = [parts[0] + 1, 0, 0]
        } else if (level == 'minor') {
            parts = [parts[0], parts[1] + 1, 0]
        } else {
            parts = [parts[0], parts[1], parts[2] + 1]
        }
        def next = "${parts[0]}.${parts[1]}.${parts[2]}-SNAPSHOT"
        cpfWriteVersionProperty("component.${component}", next)
        logger.lifecycle("Component version updated: ${component} ${current} -> ${next}")
    }
}

tasks.register('prepareReleaseCandidate') {
    group = 'release'
    description = '현재 CPF platform 개발 버전을 지정한 RC 버전으로 전환합니다.'
    doLast {
        def rc = (findProperty('rc') ?: '').toString().trim()
        if (!(rc ==~ /[1-9]\d*/)) {
            throw new GradleException('rc는 1 이상의 정수여야 합니다.')
        }
        def base = rootProject.ext.cpfPlatformVersion.toString().replaceFirst(/-(?:SNAPSHOT|rc\.\d+)$/, '')
        cpfParseSemanticVersion(base)
        cpfWriteVersionProperty('platformVersion', "${base}-rc.${rc}")
        logger.lifecycle("Release candidate prepared: ${base}-rc.${rc}")
    }
}

tasks.register('prepareRelease') {
    group = 'release'
    description = '현재 CPF platform SNAPSHOT 또는 RC 버전을 최종 버전으로 전환합니다.'
    doLast {
        def current = rootProject.ext.cpfPlatformVersion.toString()
        if (!(current.endsWith('-SNAPSHOT') || current ==~ /.*-rc\.\d+$/)) {
            throw new GradleException("Only SNAPSHOT or RC can be prepared as final release: ${current}")
        }
        def finalVersion = current.replaceFirst(/-(?:SNAPSHOT|rc\.\d+)$/, '')
        cpfParseSemanticVersion(finalVersion)
        cpfWriteVersionProperty('platformVersion', finalVersion)
        logger.lifecycle("Final release version prepared: ${finalVersion}")
    }
}

tasks.register('aggregateJavadoc') {
    group = 'documentation'
    description = '모든 CPF 모듈의 JavaDoc을 생성합니다.'
    dependsOn subprojects.collect { "${it.path}:javadoc" }
}

tasks.register('generateReleaseMetadata') {
    group = 'distribution'
    description = '현재 CPF 산출물의 checksum, SBOM-lite와 provenance metadata를 생성합니다.'
    dependsOn subprojects.collect { "${it.path}:assemble" }
    doLast {
        def outputDir = file("${buildDir}/release/${rootProject.ext.cpfPlatformVersion}")
        outputDir.mkdirs()
        def artifacts = subprojects.collectMany { module ->
            def libDir = new File(module.buildDir, 'libs')
            libDir.exists() ? libDir.listFiles().findAll { it.isFile() && it.name =~ /\.(jar|war)$/ } : []
        }.sort { it.name }
        def artifactRows = artifacts.collect { artifact ->
            def digest = java.security.MessageDigest.getInstance('SHA-256')
            artifact.withInputStream { stream ->
                byte[] buffer = new byte[8192]
                int read
                while ((read = stream.read(buffer)) > 0) {
                    digest.update(buffer, 0, read)
                }
            }
            def sha256 = digest.digest().encodeHex().toString()
            new File(outputDir, "${artifact.name}.sha256").setText("${sha256}  ${artifact.name}\n", 'UTF-8')
            [name: artifact.name, sha256: sha256, size: artifact.length()]
        }
        def gitSha = providers.exec {
            commandLine 'git', 'rev-parse', 'HEAD'
            ignoreExitValue = true
        }.standardOutput.asText.get().trim()
        def json = new groovy.json.JsonBuilder([
                schemaVersion: 1,
                platformVersion: rootProject.ext.cpfPlatformVersion,
                compatibleRange: rootProject.ext.cpfCompatibleRange,
                gitCommit: gitSha,
                signatureStatus: 'NOT_SIGNED_NO_APPROVED_KEY',
                artifacts: artifactRows
        ]).toPrettyString()
        new File(outputDir, 'cpf-release-manifest.json').setText(json + '\n', 'UTF-8')
        new File(outputDir, 'cpf-sbom-lite.json').setText(json + '\n', 'UTF-8')
        new File(outputDir, 'cpf-provenance.json').setText(json + '\n', 'UTF-8')
        logger.lifecycle("CPF release metadata generated: ${outputDir}")
    }
}

tasks.register('runLocalServices') {
    group = 'application'
    description = 'CPF verification or deployment task.'

    dependsOn ':cpf-member:classes', ':cpf-reference:classes', ':cpf-admin:classes', ':cpf-biz-admin:classes',
            ':cpf-batch:classes', ':cpf-account:classes', ':cpf-gateway:classes', ':cpf-external:classes'

    doLast {
        def services = [
                [name: 'MBR', project: project(':cpf-member'), mainClass: 'com.cpf.member.MbrApplication'],
                 [name: 'REF', project: project(':cpf-reference'), mainClass: 'com.cpf.reference.ReferenceApplication'],
                [name: 'ADM', project: project(':cpf-admin'), mainClass: 'com.cpf.admin.AdmApplication'],
                [name: 'BZA', project: project(':cpf-biz-admin'), mainClass: 'com.cpf.bizadmin.BzaApplication', defaultEnabled: true],
                [name: 'BAT', project: project(':cpf-batch'), mainClass: 'com.cpf.batch.BatApplication', defaultEnabled: false],
                [name: 'ACC', project: project(':cpf-account'), mainClass: 'com.cpf.account.AccApplication', defaultEnabled: false],
                [name: 'EXS', project: project(':cpf-external'), mainClass: 'com.cpf.external.ExternalApplication', defaultEnabled: false],
                [name: 'GWY', project: project(':cpf-gateway'), mainClass: 'com.cpf.gateway.CpfGatewayApplication', defaultEnabled: false]
        ]
        def requestedServiceText = (project.findProperty('cpfRunServices') ?: System.getenv('CPF_RUN_LOCAL_SERVICES') ?: '').toString()
        if (!requestedServiceText.isBlank()) {
            def requestedServices = requestedServiceText
                    .split(',')
                    .collect { it.trim().toUpperCase(Locale.ROOT) }
                    .findAll { !it.isBlank() } as Set
            services = services.findAll { requestedServices.contains(it.name) }
            if (services.isEmpty()) {
                throw new GradleException("Unsupported cpfRunServices value: ${requestedServiceText}")
            }
        } else {
            services = services.findAll { it.get('defaultEnabled', true) }
        }
        def javaExecutable = new File(
                System.getProperty('java.home'),
                'bin/java' + (System.getProperty('os.name').toLowerCase().contains('windows') ? '.exe' : '')
        )
        def processes = []
        def logThreads = []

        logger.lifecycle("Starting CPF local services: ${services.collect { it.name }.join(', ')}")
        logger.lifecycle('Default ports: MBR(8081), REF(8099), ADM(8090), BZA(8091), BAT(8093), ACC(8082), EXS(8094), GWY(8070)')
        logger.lifecycle('cpf-core(CPF)와 cpf-common(CMN)은 라이브러리 모듈이므로 독립 서비스로 기동하지 않습니다.')

        services.each { service ->
            def classpath = service.project.sourceSets.main.runtimeClasspath.asPath
            def argFile = new File(temporaryDir, "${service.name.toLowerCase()}-java-args.txt")
            argFile.parentFile.mkdirs()
            argFile.text = [
                    '-cp',
                    quoteJavaArg(classpath),
                    service.mainClass
            ].join(System.lineSeparator())

            def processBuilder = new ProcessBuilder(javaExecutable.absolutePath, "@${argFile.absolutePath}")
            processBuilder.directory(rootProject.projectDir)
            processBuilder.redirectErrorStream(true)

            def process = processBuilder.start()
            processes << [name: service.name, process: process]

            def logThread = Thread.start("${service.name}-local-log") {
                process.inputStream.withReader('UTF-8') { reader ->
                    String line
                    while ((line = reader.readLine()) != null) {
                        println "[${service.name}] ${line}"
                    }
                }
            }
            logThreads << logThread
        }

        def shutdownHook = new Thread({
            stopLocalServiceProcesses(processes)
        }, 'runLocalServices-shutdown')
        Runtime.runtime.addShutdownHook(shutdownHook)

        try {
            while (processes.every { it.process.isAlive() }) {
                Thread.sleep(1000)
            }

            def stopped = processes.find { !it.process.isAlive() }
            if (stopped != null) {
                throw new GradleException("${stopped.name} stopped. Stopping runLocalServices.")
            }
        } finally {
            try {
                Runtime.runtime.removeShutdownHook(shutdownHook)
            } catch (IllegalStateException ignored) {
                // Shutdown hook cleanup failures are ignored because the process is already ending.
            }
            stopLocalServiceProcesses(processes)
            logThreads.each { it.join(1000) }
        }
    }
}

String quoteJavaArg(String value) {
    return '"' + value.replace('\\', '\\\\').replace('"', '\\"') + '"'
}

void stopLocalServiceProcesses(List processes) {
    processes.each { entry ->
        def process = entry.process
        if (process.isAlive()) {
            process.destroy()
            if (!process.waitFor(5, java.util.concurrent.TimeUnit.SECONDS)) {
                process.destroyForcibly()
            }
        }
    }
}

ext.cpfServiceModules = [
        MBR    : 'cpf-member',
        ADM    : 'cpf-admin',
        BAT    : 'cpf-batch',
        BZA    : 'cpf-biz-admin',
        REF    : 'cpf-reference',
        ACC    : 'cpf-account',
        EXS    : 'cpf-external',
        GWY    : 'cpf-gateway'
]
ext.cpfDeployEnvs = ['local', 'dev', 'stg', 'prod']

String cpfRequestedModule() {
    return (findProperty('cpfModule') ?: 'MBR').toString().trim().toUpperCase(Locale.ROOT)
}

String cpfModuleProjectName(String moduleCode) {
    def value = ext.cpfServiceModules[moduleCode]
    if (value == null) {
        throw new GradleException("Unsupported CPF deploy module: ${moduleCode}")
    }
    return value
}

String cpfRequestedEnv() {
    def env = (findProperty('cpfEnv') ?: 'dev').toString().trim().toLowerCase(Locale.ROOT)
    if (!ext.cpfDeployEnvs.contains(env)) {
        throw new GradleException("Unsupported CPF deploy environment: ${env}")
    }
    return env
}

File cpfResultDir() {
    return file((findProperty('cpfResultDir') ?: 'cpf-docs/evidence/20260722_01').toString())
}

ext.cpfJavaVersion = (findProperty('cpfJavaVersion') ?: System.getenv('CPF_JAVA_VERSION') ?: '25')
        .toString()
        .toInteger()

Map<String, String> cpfReadEnvFile(File envFile) {
    if (!envFile.exists()) {
        throw new GradleException("Deploy env file is missing: ${envFile}")
    }
    def values = [:]
    envFile.readLines('UTF-8').each { line ->
        def trimmed = line.trim()
        if (trimmed.isEmpty() || trimmed.startsWith('#')) {
            return
        }
        def index = trimmed.indexOf('=')
        if (index <= 0) {
            throw new GradleException("Deploy env line is invalid: ${envFile} :: ${line}")
        }
        values[trimmed.substring(0, index)] = trimmed.substring(index + 1)
    }
    return values
}

Map cpfReadInventory(File inventoryFile) {
    if (!inventoryFile.exists()) {
        throw new GradleException("Deploy inventory file is missing: ${inventoryFile}")
    }
    return new groovy.json.JsonSlurper().parse(inventoryFile) as Map
}

void cpfWriteJson(File outputFile, Object value) {
    outputFile.parentFile.mkdirs()
    outputFile.setText(groovy.json.JsonOutput.prettyPrint(groovy.json.JsonOutput.toJson(value)), 'UTF-8')
}

Map cpfValidateDeployEnv(String moduleCode, String env, File resultDir) {
    def moduleLower = cpfModuleProjectName(moduleCode)
    def envFile = file("deploy/env/${env}-${moduleLower}.env")
    def values = cpfReadEnvFile(envFile)
    def prefix = moduleCode
    def requiredKeys = [
            'SPRING_PROFILES_ACTIVE',
            "${prefix}_MODULE_ID".toString(),
            "${prefix}_INSTANCE_ID".toString(),
            "${prefix}_WAS_ID".toString(),
            "${prefix}_SERVER_PORT".toString(),
            'CPF_LOG_ROOT',
            'CPF_DB_MODE',
            'CPF_DB_URL',
            'CPF_DB_USERNAME',
            'CPF_DB_PASSWORD',
            'CPF_DB_JNDI_NAME',
            "${prefix}_DATASOURCE_MODE".toString(),
            "${prefix}_DATASOURCE_URL".toString(),
            "${prefix}_DATASOURCE_USERNAME".toString(),
            "${prefix}_DATASOURCE_PASSWORD".toString(),
            "${prefix}_DATASOURCE_JNDI_NAME".toString()
    ]
    def failures = []
    requiredKeys.each { key ->
        if (!values.containsKey(key)) {
            failures << "Required env key is missing: ${key}"
        } else if (values[key] == null || values[key].trim().isEmpty()) {
            failures << "Empty env value is not allowed: ${key}"
        }
    }
    def datasourceModeKey = "${prefix}_DATASOURCE_MODE".toString()
    def datasourcePasswordKey = "${prefix}_DATASOURCE_PASSWORD".toString()
    if (values[datasourceModeKey] && !['url', 'jndi'].contains(values[datasourceModeKey].toLowerCase(Locale.ROOT))) {
        failures << "${prefix}_DATASOURCE_MODE must be url or jndi."
    }
    if (values['CPF_DB_MODE'] && !['url', 'jndi'].contains(values['CPF_DB_MODE'].toLowerCase(Locale.ROOT))) {
        failures << 'CPF_DB_MODE must be url or jndi.'
    }
    if ((values[datasourcePasswordKey] ?: '').toLowerCase(Locale.ROOT).contains('local_pw')) {
        failures << "${prefix}_DATASOURCE_PASSWORD must not contain a local default password marker."
    }
    def logRoot = values['CPF_LOG_ROOT'] ?: ''
    if (logRoot && (!new File(logRoot).isAbsolute() || logRoot.replace('\\', '/').split('/').contains('..'))) {
        failures << 'CPF_LOG_ROOT must be an absolute path without parent traversal.'
    }
    def result = [
            generatedAt: new Date().format("yyyy-MM-dd'T'HH:mm:ss.SSSZ"),
            module     : moduleCode,
            env        : env,
            status     : failures.isEmpty() ? 'DONE' : 'FAILED',
            envFile    : "deploy/env/${env}-${moduleLower}.env",
            keyCount   : values.size(),
            failures   : failures
    ]
    cpfWriteJson(new File(resultDir, "deploy-env-${moduleLower}-${env}.sanitized.json"), result)
    if (!failures.isEmpty()) {
        throw new GradleException("Deploy env validation failed: ${failures.join(', ')}")
    }
    return result
}

Map cpfValidateDeployInventory(String moduleCode, String env, File resultDir) {
    def moduleLower = cpfModuleProjectName(moduleCode)
    def inventoryFile = file("deploy/inventory/${env}-services.json")
    if (env == 'prod' && !inventoryFile.exists()) {
        inventoryFile = file('deploy/inventory/prod-services.template.json')
    }
    def inventory = cpfReadInventory(inventoryFile)
    def services = inventory.services ?: []
    def service = services.find { it.module == moduleCode }
    def failures = []
    if (service == null) {
        failures << "Inventory service is missing: ${moduleCode}"
    } else {
        ['module', 'hostAlias', 'sshHostEnvKey', 'sshUserEnvKey', 'deployBase', 'healthUrl', 'serviceName', 'portEnvKey', 'profile', 'runtimeMode', 'approvalRequired', 'rollbackEnabled'].each { key ->
            if (!service.containsKey(key)) {
                failures << "Inventory field is missing: ${key}"
            }
        }
        if (service.runtimeMode && !['embedded-bootjar', 'external-was', 'external-tomcat-war'].contains(service.runtimeMode)) {
            failures << "runtimeMode must be embedded-bootjar, external-was, or external-tomcat-war."
        }
    }
    def result = [
            generatedAt: new Date().format("yyyy-MM-dd'T'HH:mm:ss.SSSZ"),
            module     : moduleCode,
            env        : env,
            status     : failures.isEmpty() ? 'DONE' : 'FAILED',
            inventory  : inventoryFile.path.replace('\\', '/'),
            target     : service,
            failures   : failures
    ]
    cpfWriteJson(new File(resultDir, "deploy-inventory-${moduleLower}-${env}.sanitized.json"), result)
    if (!failures.isEmpty()) {
        throw new GradleException("Deploy inventory validation failed: ${failures.join(', ')}")
    }
    return result
}

Map cpfCheckPackagedDependencies(String moduleCode, File resultDir) {
    def moduleLower = cpfModuleProjectName(moduleCode)
    def jarFile = project(":${moduleLower}").tasks.named('bootJar').get().archiveFile.get().asFile
    if (!jarFile.exists()) {
        throw new GradleException("bootJar output is missing: ${jarFile}")
    }
    def entries = []
    new java.util.zip.ZipFile(jarFile).withCloseable { zip ->
        entries = zip.entries().collect { it.name }
    }
    def containsCore = entries.any { it ==~ /BOOT-INF\/lib\/cpf-core-.*\.jar/ }
    def containsCommon = entries.any { it ==~ /BOOT-INF\/lib\/cpf-common-.*\.jar/ }
    def failures = []
    if (!containsCore) {
        failures << 'bootJar에 cpf-core 의존성이 포함되지 않았습니다.'
    }
    if (!(moduleCode in ['BAT', 'GWY']) && !containsCommon) {
        failures << 'bootJar에 cpf-common 의존성이 포함되지 않았습니다.'
    }
    def result = [
            generatedAt: new Date().format("yyyy-MM-dd'T'HH:mm:ss.SSSZ"),
            module     : moduleCode,
            status     : failures.isEmpty() ? 'DONE' : 'FAILED',
            artifact   : jarFile.path.replace('\\', '/'),
            containsCore: containsCore,
            containsCommon: containsCommon,
            failures   : failures
    ]
    cpfWriteJson(new File(resultDir, "packaged-dependencies-${moduleLower}.sanitized.json"), result)
    if (!failures.isEmpty()) {
        throw new GradleException("Package dependency validation failed: ${failures.join(', ')}")
    }
    return result
}

String cpfSha256(File file) {
    def digest = java.security.MessageDigest.getInstance('SHA-256')
    file.withInputStream { input ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = input.read(buffer)) > 0) {
            digest.update(buffer, 0, read)
        }
    }
    return digest.digest().collect { String.format('%02x', it) }.join()
}

