# CMN 공통 모듈 로컬 실행용 환경 설정입니다.
# Spring Boot 3.0 및 Java 21 환경에서 공통 데이터 소스와 MyBatis 매핑을 정의합니다.

spring:
  datasource:
    cmn:
      #      jndi-name: java:comp/env/jdbc/cmnDS
      url: jdbc:mariadb://localhost:3306/cmnDB
      username: root
      password: test
      driver-class-name: org.mariadb.jdbc.Driver

mybatis:
  config-location: classpath:mybatis/config/cmn-mybatis-config.xml
  mapper-locations: classpath*:mybatis/mapper/cmn/**/*.xml
  type-aliases-package: fps.cmn.smp.entity

fps:
  cmn:
    cache:
      preload-enabled: ${FPS_CMN_CACHE_PRELOAD_ENABLED:true}
      event-poll-enabled: ${FPS_CMN_CACHE_EVENT_POLL_ENABLED:true}
      refresh-poll-millis: ${FPS_CMN_CACHE_REFRESH_POLL_MILLIS:5000}
      refresh-initial-delay-millis: ${FPS_CMN_CACHE_REFRESH_INITIAL_DELAY_MILLIS:5000}
      periodic-refresh-millis: ${FPS_CMN_CACHE_PERIODIC_REFRESH_MILLIS:1800000}
      periodic-refresh-initial-delay-millis: ${FPS_CMN_CACHE_PERIODIC_REFRESH_INITIAL_DELAY_MILLIS:1800000}




