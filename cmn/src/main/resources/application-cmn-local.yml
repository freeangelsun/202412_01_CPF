# CMN 로컬 프로필 설정입니다.

spring:
  datasource:
    cmn:
      url: ${CMN_DB_URL:${PFW_DB_URL:jdbc:mariadb://localhost:3306/pfwDB}}
      username: ${CMN_DB_USERNAME:${PFW_DB_USERNAME:cpf_pfw_app}}
      password: ${CMN_DB_PASSWORD:${PFW_DB_PASSWORD:cpf_local_pw}}
      driver-class-name: org.mariadb.jdbc.Driver
    cmn-business:
      url: ${CMN_BUSINESS_DB_URL:jdbc:mariadb://localhost:3306/cmnDB}
      username: ${CMN_BUSINESS_DB_USERNAME:cpf_cmn_app}
      password: ${CMN_BUSINESS_DB_PASSWORD:cpf_local_pw}
      driver-class-name: org.mariadb.jdbc.Driver

cpf:
  cmn:
    business-db:
      enabled: ${CPF_CMN_BUSINESS_DB_ENABLED:false}
    cache:
      preload-enabled: ${FPS_CMN_CACHE_PRELOAD_ENABLED:true}
      fail-fast-on-startup: ${FPS_CMN_CACHE_FAIL_FAST_ON_STARTUP:false}
      event-poll-enabled: ${FPS_CMN_CACHE_EVENT_POLL_ENABLED:true}
      refresh-poll-millis: ${FPS_CMN_CACHE_REFRESH_POLL_MILLIS:5000}
      refresh-initial-delay-millis: ${FPS_CMN_CACHE_REFRESH_INITIAL_DELAY_MILLIS:5000}
      periodic-refresh-millis: ${FPS_CMN_CACHE_PERIODIC_REFRESH_MILLIS:1800000}
      periodic-refresh-initial-delay-millis: ${FPS_CMN_CACHE_PERIODIC_REFRESH_INITIAL_DELAY_MILLIS:1800000}
    messaging:
      enabled: ${FPS_CMN_MESSAGING_ENABLED:true}
      broker: ${FPS_CMN_MESSAGING_BROKER:IN_MEMORY}
      default-destination: ${FPS_CMN_MESSAGING_DEFAULT_DESTINATION:cpf.local.event}
      recent-message-limit: ${FPS_CMN_MESSAGING_RECENT_LIMIT:200}
      rabbit:
        exchange: ${FPS_CMN_RABBIT_EXCHANGE:cpf.exchange}
        routing-key: ${FPS_CMN_RABBIT_ROUTING_KEY:cpf.local.event}
    file-exchange:
      base-dir: ${FPS_CMN_FILE_BASE_DIR:${java.io.tmpdir}/cpf-cmn-file-exchange}
      ssh-enabled: ${FPS_CMN_FILE_SSH_ENABLED:false}
      dry-run: ${FPS_CMN_FILE_DRY_RUN:true}
      timeout-seconds: ${FPS_CMN_FILE_TIMEOUT_SECONDS:15}
      allowed-hosts: ${FPS_CMN_FILE_ALLOWED_HOSTS:}
    security:
      jwt:
        issuer: ${FPS_CMN_SECURITY_JWT_ISSUER:CPF-LOCAL}
        audience: ${FPS_CMN_SECURITY_JWT_AUDIENCE:CPF-LOCAL-API}
        secret: ${FPS_CMN_SECURITY_JWT_SECRET:local-education-secret-change-me}
        ttl-seconds: ${FPS_CMN_SECURITY_JWT_TTL_SECONDS:300}
