# CMN 테스트 프로필 설정입니다.

spring:
  datasource:
    cmn:
      url: ${CMN_DB_URL:${PFW_DB_URL:jdbc:mariadb://localhost:3306/pfwDB}}
      username: ${CMN_DB_USERNAME:${PFW_DB_USERNAME:cpf_pfw_app}}
      password: ${CMN_DB_PASSWORD:${PFW_DB_PASSWORD:cpf_local_pw}}
      driver-class-name: org.mariadb.jdbc.Driver
    cmn-business:
      url: ${CMN_BUSINESS_DB_URL:jdbc:mariadb://localhost:3306/cmnDB}
      username: ${CMN_BUSINESS_DB_USERNAME:cpf_cmn_app}
      password: ${CMN_BUSINESS_DB_PASSWORD:cpf_local_pw}
      driver-class-name: org.mariadb.jdbc.Driver

cpf:
  cmn:
    business-db:
      enabled: ${CPF_CMN_BUSINESS_DB_ENABLED:false}
    cache:
      preload-enabled: false
      event-poll-enabled: false
