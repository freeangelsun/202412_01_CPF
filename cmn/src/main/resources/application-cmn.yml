# CMN 공통 모듈 기본 설정입니다.

spring:
  cache:
    type: caffeine
  datasource:
    cmn:
      # PFW가 소유하는 코드, 메시지, 응답코드, 설정, 캐시 이벤트를 조회합니다.
      url: ${CMN_DB_URL:${PFW_DB_URL:jdbc:mariadb://localhost:3306/pfwDB}}
      username: ${CMN_DB_USERNAME:${PFW_DB_USERNAME:cpf_pfw_app}}
      password: ${CMN_DB_PASSWORD:${PFW_DB_PASSWORD:__REPLACE_BY_ENV__}}
      driver-class-name: org.mariadb.jdbc.Driver
    cmn-business:
      # 채번, 알림 로그, 업무 로그를 저장하는 선택형 업무 공통 DB입니다.
      url: ${CMN_BUSINESS_DB_URL:jdbc:mariadb://localhost:3306/cmnDB}
      username: ${CMN_BUSINESS_DB_USERNAME:cpf_cmn_app}
      password: ${CMN_BUSINESS_DB_PASSWORD:__REPLACE_BY_ENV__}
      driver-class-name: org.mariadb.jdbc.Driver

mybatis:
  config-location: classpath:mybatis/config/cmn-mybatis-config.xml
  mapper-locations: classpath*:mybatis/mapper/cmn/**/*.xml
  type-aliases-package: cpf.cmn

cpf:
  cmn:
    business-db:
      enabled: ${CPF_CMN_BUSINESS_DB_ENABLED:false}
    cache:
      preload-enabled: ${CPF_CMN_CACHE_PRELOAD_ENABLED:${CPF_CMN_CACHE_PRELOAD_ENABLED:true}}
      fail-fast-on-startup: ${CPF_CMN_CACHE_FAIL_FAST_ON_STARTUP:${CPF_CMN_CACHE_FAIL_FAST_ON_STARTUP:false}}
      event-poll-enabled: ${CPF_CMN_CACHE_EVENT_POLL_ENABLED:${CPF_CMN_CACHE_EVENT_POLL_ENABLED:true}}
      refresh-poll-millis: ${CPF_CMN_CACHE_REFRESH_POLL_MILLIS:${CPF_CMN_CACHE_REFRESH_POLL_MILLIS:5000}}
      refresh-initial-delay-millis: ${CPF_CMN_CACHE_REFRESH_INITIAL_DELAY_MILLIS:${CPF_CMN_CACHE_REFRESH_INITIAL_DELAY_MILLIS:5000}}
      periodic-refresh-millis: ${CPF_CMN_CACHE_PERIODIC_REFRESH_MILLIS:${CPF_CMN_CACHE_PERIODIC_REFRESH_MILLIS:1800000}}
      periodic-refresh-initial-delay-millis: ${CPF_CMN_CACHE_PERIODIC_REFRESH_INITIAL_DELAY_MILLIS:${CPF_CMN_CACHE_PERIODIC_REFRESH_INITIAL_DELAY_MILLIS:1800000}}
    messaging:
      enabled: ${CPF_CMN_MESSAGING_ENABLED:${CPF_CMN_MESSAGING_ENABLED:true}}
      broker: ${CPF_CMN_MESSAGING_BROKER:${CPF_CMN_MESSAGING_BROKER:IN_MEMORY}}
      default-destination: ${CPF_CMN_MESSAGING_DEFAULT_DESTINATION:${CPF_CMN_MESSAGING_DEFAULT_DESTINATION:cpf.default.event}}
      recent-message-limit: ${CPF_CMN_MESSAGING_RECENT_LIMIT:${CPF_CMN_MESSAGING_RECENT_LIMIT:200}}
      rabbit:
        exchange: ${CPF_CMN_RABBIT_EXCHANGE:${CPF_CMN_RABBIT_EXCHANGE:cpf.exchange}}
        routing-key: ${CPF_CMN_RABBIT_ROUTING_KEY:${CPF_CMN_RABBIT_ROUTING_KEY:cpf.default.event}}
    file-exchange:
      base-dir: ${CPF_CMN_FILE_BASE_DIR:${CPF_CMN_FILE_BASE_DIR:${java.io.tmpdir}/cpf-cmn-file-exchange}}
      ssh-enabled: ${CPF_CMN_FILE_SSH_ENABLED:${CPF_CMN_FILE_SSH_ENABLED:false}}
      dry-run: ${CPF_CMN_FILE_DRY_RUN:${CPF_CMN_FILE_DRY_RUN:true}}
      timeout-seconds: ${CPF_CMN_FILE_TIMEOUT_SECONDS:${CPF_CMN_FILE_TIMEOUT_SECONDS:15}}
      allowed-hosts: ${CPF_CMN_FILE_ALLOWED_HOSTS:${CPF_CMN_FILE_ALLOWED_HOSTS:}}
    security:
      jwt:
        issuer: ${CPF_CMN_SECURITY_JWT_ISSUER:${CPF_CMN_SECURITY_JWT_ISSUER:CPF}}
        audience: ${CPF_CMN_SECURITY_JWT_AUDIENCE:${CPF_CMN_SECURITY_JWT_AUDIENCE:CPF-API}}
        secret: ${CPF_CMN_SECURITY_JWT_SECRET:${CPF_CMN_SECURITY_JWT_SECRET:__REPLACE_BY_ENV__}}
        ttl-seconds: ${CPF_CMN_SECURITY_JWT_TTL_SECONDS:${CPF_CMN_SECURITY_JWT_TTL_SECONDS:300}}

---
# prod에서는 DB/JWT secret 기본값을 제거하고 배포 환경에서 반드시 주입합니다.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    cmn:
      url: ${CMN_DB_URL:${PFW_DB_URL}}
      username: ${CMN_DB_USERNAME:${PFW_DB_USERNAME}}
      password: ${CMN_DB_PASSWORD:${PFW_DB_PASSWORD}}
    cmn-business:
      url: ${CMN_BUSINESS_DB_URL}
      username: ${CMN_BUSINESS_DB_USERNAME}
      password: ${CMN_BUSINESS_DB_PASSWORD}

cpf:
  cmn:
    business-db:
      enabled: ${CPF_CMN_BUSINESS_DB_ENABLED:false}
    security:
      jwt:
        secret: ${CPF_CMN_SECURITY_JWT_SECRET:${CPF_CMN_SECURITY_JWT_SECRET}}
