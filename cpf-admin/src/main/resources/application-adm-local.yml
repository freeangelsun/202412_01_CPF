# ADM local profile 설정입니다.

server:
  port: ${ADM_SERVER_PORT:8090}

spring:
  datasource:
    adm:
      mode: ${ADM_DATASOURCE_MODE:url}
      url: ${ADM_DATASOURCE_URL:${ADM_DB_URL:jdbc:mariadb://localhost:3306/admDB}}
      username: ${ADM_DATASOURCE_USERNAME:${ADM_DB_USERNAME:cpf_adm_app}}
      password: ${ADM_DATASOURCE_PASSWORD:${ADM_DB_PASSWORD:__REPLACE_BY_ENV__}}
      jndi-name: ${ADM_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfAdminDataSource}
