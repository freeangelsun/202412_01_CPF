# ADM 서비스 설정입니다.

spring:
  config:
    import:
      - optional:classpath:application-cpf.yml
      - optional:classpath:application-cpf-${spring.profiles.active:local}.yml
      - optional:classpath:application-cmn.yml
      - optional:classpath:application-cmn-${spring.profiles.active:local}.yml
      - optional:classpath:application-adm.yml
      - optional:classpath:application-adm-${spring.profiles.active:local}.yml
  application:
    name: adm
  profiles:
    active: local
    include: cpf, cmn
  datasource:
    adm:
      mode: ${ADM_DATASOURCE_MODE:url}
      driver-class-name: ${ADM_DB_DRIVER:org.mariadb.jdbc.Driver}
      url: ${ADM_DB_URL:jdbc:mariadb://localhost:3306/admDB}
      username: ${ADM_DB_USERNAME:cpf_adm_app}
      password: ${ADM_DB_PASSWORD:__REPLACE_BY_ENV__}
      jndi-name: ${ADM_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfAdminDataSource}
    mbr:
      mode: ${MBR_DB_MODE:url}
      driver-class-name: ${MBR_DB_DRIVER:org.mariadb.jdbc.Driver}
      url: ${MBR_DB_URL:jdbc:mariadb://localhost:3306/mbrDB}
      username: ${MBR_DB_USERNAME:cpf_mbr_app}
      password: ${MBR_DB_PASSWORD:__REPLACE_BY_ENV__}
      jndi-name: ${MBR_DB_JNDI_NAME:java:comp/env/jdbc/cpfMemberDataSource}
    ref:
      mode: ${REF_DB_MODE:url}
      driver-class-name: ${REF_DB_DRIVER:org.mariadb.jdbc.Driver}
      url: ${REF_DB_URL:jdbc:mariadb://localhost:3306/refDB}
      username: ${REF_DB_USERNAME:cpf_ref_app}
      password: ${REF_DB_PASSWORD:__REPLACE_BY_ENV__}
      jndi-name: ${REF_DB_JNDI_NAME:java:comp/env/jdbc/cpfReferenceDataSource}
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

server:
  port: ${ADM_SERVER_PORT:8090}

logging:
  level:
    root: INFO
    com.cpf.core: INFO
    com.cpf.common: INFO
    com.cpf.admin: DEBUG

cpf:
  framework:
    module-id: ADM
    was-id: ${WAS_ID:admAP01}
  adm:
    bootstrap:
      enabled: ${CPF_ADM_BOOTSTRAP_ENABLED:false}
      allow-prod: ${CPF_ADM_BOOTSTRAP_ALLOW_PROD:false}
      operator-id: ${CPF_ADM_BOOTSTRAP_OPERATOR_ID:admin}
      operator-name: ${CPF_ADM_BOOTSTRAP_OPERATOR_NAME:CPF 관리자}
      password: ${CPF_ADM_BOOTSTRAP_PASSWORD:}
    security:
      enabled: ${CPF_ADM_SECURITY_ENABLED:true}
      session-ttl-seconds: ${CPF_ADM_SESSION_TTL_SECONDS:3600}
      ip-allowlist: ${CPF_ADM_IP_ALLOWLIST:}
      mfa-enabled: ${CPF_ADM_MFA_ENABLED:false}
      session-cleanup-cron: ${CPF_ADM_SESSION_CLEANUP_CRON:0 */10 * * * *}
    password-policy:
      expire-days: ${CPF_ADM_PASSWORD_EXPIRE_DAYS:90}
      min-length: ${CPF_ADM_PASSWORD_MIN_LENGTH:10}
      required-category-count: ${CPF_ADM_PASSWORD_REQUIRED_CATEGORY_COUNT:3}
      max-fail-count: ${CPF_ADM_PASSWORD_MAX_FAIL_COUNT:5}
      history-count: ${CPF_ADM_PASSWORD_HISTORY_COUNT:3}
