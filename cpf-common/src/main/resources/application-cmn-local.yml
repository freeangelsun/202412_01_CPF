# CMN 로컬 프로필 설정입니다.

spring:
  datasource:
    cmn:
      mode: ${CMN_DB_MODE:${CPF_DB_MODE:url}}
      url: ${CMN_DB_URL:${CPF_DB_URL:jdbc:mariadb://localhost:3306/cpfDB}}
      username: ${CMN_DB_USERNAME:${CPF_DB_USERNAME:cpf_app}}
      password: ${CMN_DB_PASSWORD:${CPF_DB_PASSWORD:__REPLACE_BY_ENV__}}
      jndi-name: ${CMN_DB_JNDI_NAME:${CPF_DB_JNDI_NAME:java:comp/env/jdbc/cpfCoreDataSource}}
      driver-class-name: org.mariadb.jdbc.Driver
    cmn-business:
      mode: ${CMN_BUSINESS_DB_MODE:url}
      url: ${CMN_BUSINESS_DB_URL:jdbc:mariadb://localhost:3306/cmnDB}
      username: ${CMN_BUSINESS_DB_USERNAME:cpf_cmn_app}
      password: ${CMN_BUSINESS_DB_PASSWORD:__REPLACE_BY_ENV__}
      jndi-name: ${CMN_BUSINESS_DB_JNDI_NAME:java:comp/env/jdbc/cpfCommonDataSource}
      driver-class-name: org.mariadb.jdbc.Driver

cpf:
  cmn:
    business-db:
      enabled: ${CPF_CMN_BUSINESS_DB_ENABLED:false}
    cache:
      preload-enabled: ${CPF_CMN_CACHE_PRELOAD_ENABLED:true}
      fail-fast-on-startup: ${CPF_CMN_CACHE_FAIL_FAST_ON_STARTUP:false}
      event-poll-enabled: ${CPF_CMN_CACHE_EVENT_POLL_ENABLED:true}
      refresh-poll-millis: ${CPF_CMN_CACHE_REFRESH_POLL_MILLIS:5000}
      refresh-initial-delay-millis: ${CPF_CMN_CACHE_REFRESH_INITIAL_DELAY_MILLIS:5000}
      periodic-refresh-millis: ${CPF_CMN_CACHE_PERIODIC_REFRESH_MILLIS:1800000}
      periodic-refresh-initial-delay-millis: ${CPF_CMN_CACHE_PERIODIC_REFRESH_INITIAL_DELAY_MILLIS:1800000}
    messaging:
      enabled: ${CPF_CMN_MESSAGING_ENABLED:true}
      broker: ${CPF_CMN_MESSAGING_BROKER:IN_MEMORY}
      default-destination: ${CPF_CMN_MESSAGING_DEFAULT_DESTINATION:cpf.local.event}
      recent-message-limit: ${CPF_CMN_MESSAGING_RECENT_LIMIT:200}
      rabbit:
        exchange: ${CPF_CMN_RABBIT_EXCHANGE:cpf.exchange}
        routing-key: ${CPF_CMN_RABBIT_ROUTING_KEY:cpf.local.event}
    file-exchange:
      base-dir: ${CPF_CMN_FILE_BASE_DIR:${java.io.tmpdir}/cpf-cmn-file-exchange}
      ssh-enabled: ${CPF_CMN_FILE_SSH_ENABLED:false}
      dry-run: ${CPF_CMN_FILE_DRY_RUN:true}
      timeout-seconds: ${CPF_CMN_FILE_TIMEOUT_SECONDS:15}
      allowed-hosts: ${CPF_CMN_FILE_ALLOWED_HOSTS:}
    security:
      jwt:
        issuer: ${CPF_CMN_SECURITY_JWT_ISSUER:CPF-LOCAL}
        audience: ${CPF_CMN_SECURITY_JWT_AUDIENCE:CPF-LOCAL-API}
        secret: ${CPF_CMN_SECURITY_JWT_SECRET:__REPLACE_BY_ENV__}
        ttl-seconds: ${CPF_CMN_SECURITY_JWT_TTL_SECONDS:300}
