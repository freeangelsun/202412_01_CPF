# CMN stg 공통 정책입니다. DB 접속값과 secret은 배포 환경에서 주입합니다.

spring:
  datasource:
    cmn:
      mode: ${CMN_DB_MODE:${CPF_DB_MODE:url}}
      url: ${CMN_DB_URL:${CPF_DB_URL:}}
      database-name: ${CMN_DB_NAME:${CPF_DB_NAME:cpfDB}}
      username: ${CMN_DB_USERNAME:${CPF_DB_USERNAME}}
      password: ${CMN_DB_PASSWORD:${CPF_DB_PASSWORD}}
      jndi-name: ${CMN_DB_JNDI_NAME:${CPF_DB_JNDI_NAME:java:comp/env/jdbc/cpfCoreDataSource}}
      driver-class-name: ${CMN_DB_DRIVER:${CPF_DB_DRIVER:}}
    cmn-sample:
      mode: ${CMN_SAMPLE_DB_MODE:url}
      url: ${CMN_SAMPLE_DB_URL:}
      database-name: ${CMN_SAMPLE_DB_NAME:cmnDB}
      username: ${CMN_SAMPLE_DB_USERNAME}
      password: ${CMN_SAMPLE_DB_PASSWORD}
      jndi-name: ${CMN_SAMPLE_DB_JNDI_NAME:java:comp/env/jdbc/cpfCommonSampleDataSource}
      driver-class-name: ${CMN_SAMPLE_DB_DRIVER:}

cpf:
  cmn:
    sample-db:
      enabled: ${CPF_CMN_SAMPLE_DB_ENABLED:false}
    cache:
      preload-enabled: ${CPF_CMN_CACHE_PRELOAD_ENABLED:true}
      refresh-poll-millis: ${CPF_CMN_CACHE_REFRESH_POLL_MILLIS:5000}
    messaging:
      enabled: ${CPF_CMN_MESSAGING_ENABLED:true}
      broker: ${CPF_CMN_MESSAGING_BROKER:IN_MEMORY}
    file-exchange:
      dry-run: ${CPF_CMN_FILE_DRY_RUN:true}
      timeout-seconds: ${CPF_CMN_FILE_TIMEOUT_SECONDS:15}
