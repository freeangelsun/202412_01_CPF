spring:
  datasource:
    exs:
      mode: ${EXS_DATASOURCE_MODE:url}
      url: ${EXS_DATASOURCE_URL:}
      database-name: ${EXS_DB_NAME:exsDB}
      username: ${EXS_DATASOURCE_USERNAME}
      password: ${EXS_DATASOURCE_PASSWORD}
      jndi-name: ${EXS_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfExternalDataSource}
      driver-class-name: ${EXS_DB_DRIVER:}
    cpf:
      mode: ${CPF_DB_MODE:url}
      url: ${CPF_DB_URL:}
      database-name: ${CPF_DB_NAME:cpfDB}
      username: ${CPF_DB_USERNAME}
      password: ${CPF_DB_PASSWORD}
      jndi-name: ${CPF_DB_JNDI_NAME:java:comp/env/jdbc/cpfCoreDataSource}
      driver-class-name: ${CPF_DB_DRIVER:}

server:
  port: ${EXS_SERVER_PORT:8094}

cpf:
  framework:
    module-id: ${EXS_MODULE_ID:EXS}
    was-id: ${EXS_WAS_ID:exsAP01}
    instance-id: ${EXS_INSTANCE_ID:exs-local-01}
  services:
    # 기관별 실제 base URL은 CPF 서비스 레지스트리를 우선 사용합니다.
    exs-simulator:
      base-url: ${EXS_SIMULATOR_BASE_URL:http://127.0.0.1:8099}
