spring:
  application:
    name: cpf-gateway
  datasource:
    cpf:
      mode: ${GWY_DATASOURCE_MODE:${CPF_DB_MODE:url}}
      url: ${GWY_DATASOURCE_URL:${CPF_DB_URL:}}
      database-name: ${GWY_DB_NAME:${CPF_DB_NAME:cpfDB}}
      username: ${GWY_DATASOURCE_USERNAME:cpf_app}
      password: ${GWY_DATASOURCE_PASSWORD:__REPLACE_BY_ENV__}
      jndi-name: ${GWY_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfGatewayDataSource}
      driver-class-name: ${GWY_DB_DRIVER:${CPF_DB_DRIVER:}}
  config:
    import:
      - optional:classpath:application-cpf.yml
      - optional:file:${CPF_CONFIG_DIR:./config}/application-cpf.yml
      - optional:file:${CPF_CONFIG_DIR:./config}/application-cpf-${SPRING_PROFILES_ACTIVE:local}.yml

server:
  port: ${GWY_SERVER_PORT:8070}

cpf:
  framework:
    module-id: ${GWY_MODULE_ID:GWY}
    instance-id: ${GWY_INSTANCE_ID:gwy-local-01}
    was-id: ${GWY_WAS_ID:gwLC001}
  gateway:
    route-refresh-millis: ${GWY_ROUTE_REFRESH_MILLIS:30000}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
