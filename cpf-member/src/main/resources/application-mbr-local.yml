spring:
  datasource:
    mode: ${MBR_DATASOURCE_MODE:url}
    url: ${MBR_DATASOURCE_URL:${MBR_DB_URL:}}
    database-name: ${MBR_DB_NAME:mbrDB}
    username: ${MBR_DATASOURCE_USERNAME:${MBR_DB_USERNAME:cpf_mbr_app}}
    password: ${MBR_DATASOURCE_PASSWORD:${MBR_DB_PASSWORD:__REPLACE_BY_ENV__}}
    jndi-name: ${MBR_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfMemberDataSource}
    driver-class-name: ${MBR_DB_DRIVER:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: true
      connection-test-query: "SELECT 1"
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    open-in-view: false

mybatis:
  config-location: classpath:mybatis/config/mbr-mybatis-config.xml
  mapper-locations: classpath*:mybatis/vendor/${CPF_DB_VENDOR:mariadb}/mapper/mbr/**/*.xml
  type-aliases-package: com.cpf.member.bse.entity
  type-handlers-package: com.cpf.member.handler
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: NULL
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: ${MBR_SERVER_PORT:8081}
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    accept-count: 100

logging:
  level:
    root: INFO
    cpf: DEBUG
    # 로그인·회원 요청의 민감 필드와 SQL bind 값이 local 로그에도 노출되지 않게 합니다.
    org.springframework.web: INFO
    org.springframework.jdbc.core: INFO
    org.apache.ibatis: DEBUG
  config: classpath:log/cpf-logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true

cpf:
  framework:
    module-id: ${MBR_MODULE_ID:MBR}
    instance-id: ${MBR_INSTANCE_ID:${CPF_INSTANCE_ID:${SERVER_INSTANCE_ID:mbr-local-01}}}
    was-id: ${MBR_WAS_ID:local01}
