# MBR prod profile 설정입니다.

server:
  port: ${MBR_SERVER_PORT}

cpf:
  framework:
    module-id: ${MBR_MODULE_ID:MBR}
    instance-id: ${MBR_INSTANCE_ID:${CPF_INSTANCE_ID:${SERVER_INSTANCE_ID:mbr-prod-01}}}
    was-id: ${MBR_WAS_ID:${WAS_ID:mbrAP01}}

spring:
  datasource:
    mode: ${MBR_DATASOURCE_MODE:url}
    url: ${MBR_DATASOURCE_URL:${MBR_DB_URL}}
    username: ${MBR_DATASOURCE_USERNAME:${MBR_DB_USERNAME}}
    password: ${MBR_DATASOURCE_PASSWORD:${MBR_DB_PASSWORD}}
    jndi-name: ${MBR_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfMemberDataSource}
