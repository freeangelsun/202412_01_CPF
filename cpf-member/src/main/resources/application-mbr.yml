spring:
  application:
    name: mbr
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

logging:
  level:
    root: INFO
    cpf: DEBUG
    org.springframework.web: INFO
  config: classpath:log/cpf-logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

cpf:
  mbr:
    security:
      # JWT secret은 저장소에 기본값을 두지 않고 환경변수 또는 secret provider로 주입합니다.
      jwt-secret: ${CPF_MBR_JWT_SECRET:}
      access-token-ttl-seconds: ${CPF_MBR_ACCESS_TOKEN_TTL_SECONDS:600}
      refresh-token-ttl-seconds: ${CPF_MBR_REFRESH_TOKEN_TTL_SECONDS:7200}
