# REF/EDU local profile 설정입니다.

server:
  port: ${REF_SERVER_PORT:8099}

spring:
  datasource:
    ref:
      url: ${REF_DATASOURCE_URL:${REF_DB_URL:}}
      database-name: ${REF_DB_NAME:refDB}
      username: ${REF_DATASOURCE_USERNAME:${REF_DB_USERNAME:cpf_ref_app}}
      password: ${REF_DATASOURCE_PASSWORD:${REF_DB_PASSWORD:__REPLACE_BY_ENV__}}
