# REF/EDU prod profile 설정입니다.

server:
  port: ${REF_SERVER_PORT}

spring:
  datasource:
    ref:
      mode: ${REF_DATASOURCE_MODE:url}
      url: ${REF_DATASOURCE_URL:${REF_DB_URL}}
      username: ${REF_DATASOURCE_USERNAME:${REF_DB_USERNAME}}
      password: ${REF_DATASOURCE_PASSWORD:${REF_DB_PASSWORD}}
      jndi-name: ${REF_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfReferenceDataSource}

logging:
  level:
    com.cpf.reference: INFO

cpf:
  cmn:
    sample-db:
      enabled: ${CPF_CMN_SAMPLE_DB_ENABLED:false}
