# REF 참조 업무 서비스 설정입니다. 교육 기능은 이 업무 모듈 내부의 sample 분류로 제공합니다.

spring:
  config:
    import:
      - optional:classpath:application-cpf.yml
      - optional:classpath:application-cpf-${spring.profiles.active:local}.yml
      - optional:classpath:application-cmn.yml
      - optional:classpath:application-cmn-${spring.profiles.active:local}.yml
      - optional:classpath:application-ref.yml
      - optional:classpath:application-ref-${spring.profiles.active:local}.yml
  application:
    name: ref
  profiles:
    active: local
    include: cpf, cmn
  datasource:
    bat:
      mode: ${BAT_DATASOURCE_MODE:${BAT_DB_MODE:url}}
      url: ${BAT_DATASOURCE_URL:${BAT_DB_URL:}}
      database-name: ${BAT_DB_NAME:batDB}
      username: ${BAT_DATASOURCE_USERNAME:${BAT_DB_USERNAME:cpf_bat_app}}
      password: ${BAT_DATASOURCE_PASSWORD:${BAT_DB_PASSWORD:__REPLACE_BY_ENV__}}
      jndi-name: ${BAT_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfBatchDataSource}
      driver-class-name: ${BAT_DATASOURCE_DRIVER:${BAT_DB_DRIVER:}}
    ref:
      mode: ${REF_DATASOURCE_MODE:url}
      url: ${REF_DATASOURCE_URL:${REF_DB_URL:}}
      database-name: ${REF_DB_NAME:refDB}
      username: ${REF_DATASOURCE_USERNAME:${REF_DB_USERNAME:cpf_ref_app}}
      password: ${REF_DATASOURCE_PASSWORD:${REF_DB_PASSWORD:__REPLACE_BY_ENV__}}
      jndi-name: ${REF_DATASOURCE_JNDI_NAME:java:comp/env/jdbc/cpfReferenceDataSource}
      driver-class-name: ${REF_DB_DRIVER:}
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

server:
  port: 8099

logging:
  config: classpath:log/cpf-logback-spring.xml
  level:
    root: INFO
    com.cpf.core: INFO
    com.cpf.common: INFO
    com.cpf.reference: DEBUG

cpf:
  cmn:
    sample-db:
      # DB 없는 기본 기동을 보장하고 명시적 Sample Profile에서만 cmnDB를 활성화합니다.
      enabled: ${CPF_CMN_SAMPLE_DB_ENABLED:false}
  framework:
    module-id: REF
    was-id: ${WAS_ID:refAP01}
