name: cpf-local

services:
  mariadb:
    image: ${CPF_MARIADB_IMAGE:-mariadb:12}
    container_name: cpf-mariadb
    profiles: ["db", "all"]
    ports:
      - "${CPF_MARIADB_PORT:-3306}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${CPF_MARIADB_ROOT_PASSWORD:?CPF_MARIADB_ROOT_PASSWORD 환경변수를 설정해야 합니다.}
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - cpf-mariadb-data:/var/lib/mysql

  redis:
    image: ${CPF_REDIS_IMAGE:-redis:7-alpine}
    container_name: cpf-redis
    profiles: ["broker", "all"]
    ports:
      - "${CPF_REDIS_PORT:-6379}:6379"

  kafka:
    image: ${CPF_KAFKA_IMAGE:-apache/kafka:3.9.0}
    container_name: cpf-kafka
    profiles: ["broker", "all"]
    ports:
      - "${CPF_KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@cpf-kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${CPF_KAFKA_PORT:-9092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

volumes:
  cpf-mariadb-data:
