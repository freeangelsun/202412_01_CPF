# EXS local profile 설정입니다.

server:
  port: ${EXS_SERVER_PORT:8092}

cpf:
  exs:
    datasource:
      url: ${EXS_DATASOURCE_URL:${EXS_DB_URL:jdbc:mariadb://localhost:3306/exsDB}}
      username: ${EXS_DATASOURCE_USERNAME:${EXS_DB_USERNAME:cpf_exs_app}}
      password: ${EXS_DATASOURCE_PASSWORD:${EXS_DB_PASSWORD:__REPLACE_BY_ENV__}}
