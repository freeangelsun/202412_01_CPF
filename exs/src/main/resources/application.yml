spring:
  application:
    name: exs
  profiles:
    include: pfw, cmn
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

server:
  port: ${EXS_SERVER_PORT:8092}

cpf:
  framework:
    module-id: EXS
    was-id: ${WAS_ID:exsAP01}
  exs:
    datasource:
      enabled: ${CPF_EXS_DB_ENABLED:true}
      url: ${EXS_DB_URL:jdbc:mariadb://localhost:3306/exsDB}
      username: ${EXS_DB_USERNAME:cpf_exs_app}
      password: ${EXS_DB_PASSWORD:cpf_local_pw}
      driver-class-name: org.mariadb.jdbc.Driver
