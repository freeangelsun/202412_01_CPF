spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/cmnDB
    username: root
    password: test
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: true
      connection-test-query: "SELECT 1"
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    open-in-view: false

mybatis:
  config-location: classpath:mybatis/config/mbr-mybatis-config.xml
  mapper-locations: classpath:mybatis/mapper/mbr/**/*.xml
  type-aliases-package: cpf.mbr.bse.entity
  type-handlers-package: cpf.mbr.handler
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: NULL
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 8081
  servlet:
    context-path: /
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    accept-count: 100

logging:
  level:
    root: INFO
    cpf: DEBUG
    org.springframework.web: DEBUG
    org.springframework.jdbc.core: DEBUG
    org.apache.ibatis: DEBUG
  config: classpath:log/logback-local.xml
  file:
    name: logs/mbr.log

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true

cpf:
  framework:
    module-id: MBR
    was-id: local01
