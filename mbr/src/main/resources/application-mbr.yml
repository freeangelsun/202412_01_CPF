spring:
  application:
    name: mbr
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

logging:
  level:
    root: INFO
    cpf: DEBUG
    org.springframework.web: INFO
  config: classpath:log/cpf-logback-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

cpf:
  mbr:
    reference:
      # AUTO는 동일 JVM의 ACC 파사드를 우선 사용하고, 없으면 원격 프록시를 사용합니다.
      acc-call-mode: ${MBR_ACC_CALL_MODE:AUTO}
