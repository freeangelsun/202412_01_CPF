# PFW prod 공통 정책입니다. secret 원문과 업무 실행 주체 설정을 두지 않습니다.

cpf:
  http-client:
    connect-timeout-millis: ${CPF_PFW_HTTP_CONNECT_TIMEOUT_MS}
    read-timeout-millis: ${CPF_PFW_HTTP_READ_TIMEOUT_MS}
  service-call:
    registry-mode: ${CPF_PFW_SERVICE_REGISTRY_MODE}
  broker:
    publish-timeout-millis: ${CPF_PFW_BROKER_PUBLISH_TIMEOUT_MS}
  filetransfer:
    timeout-millis: ${CPF_PFW_FILETRANSFER_TIMEOUT_MS}
