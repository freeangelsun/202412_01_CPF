plugins {
    id 'org.springframework.boot' version '3.4.13'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'java'
}

group = 'fps.xyz'
version = '0.0.1-fps.xyz-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // 교육용 주제영역도 실제 업무 서비스와 동일하게 PFW/CMN을 포함해 표준 사용법을 검증합니다.
    implementation project(':pfw')
    implementation project(':cmn')

    // REST 샘플 API를 제공하기 위한 Spring MVC 의존성입니다.
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // 로컬에서 PFW/CMN 로그와 캐시 DB를 함께 사용할 수 있도록 MariaDB 드라이버를 포함합니다.
    runtimeOnly 'org.mariadb.jdbc:mariadb-java-client'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.withType(Test) {
    enabled = false
}
