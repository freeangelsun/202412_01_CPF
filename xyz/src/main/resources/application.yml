# XYZ 교육 서비스 설정입니다.

spring:
  config:
    import:
      - optional:classpath:application-pfw.yml
      - optional:classpath:application-pfw-${spring.profiles.active:local}.yml
      - optional:classpath:application-cmn.yml
      - optional:classpath:application-cmn-${spring.profiles.active:local}.yml
      - optional:classpath:application-xyz.yml
      - optional:classpath:application-xyz-${spring.profiles.active:local}.yml
  application:
    name: xyz
  profiles:
    active: local
    include: pfw, cmn
  datasource:
    xyz:
      url: ${XYZ_DB_URL:jdbc:mariadb://localhost:3306/xyzDB}
      username: ${XYZ_DB_USERNAME:cpf_xyz_app}
      password: ${XYZ_DB_PASSWORD:__REPLACE_BY_ENV__}
      driver-class-name: org.mariadb.jdbc.Driver
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

server:
  port: 8099

logging:
  config: classpath:log/logback-local.xml
  level:
    root: INFO
    cpf.pfw: INFO
    cpf.cmn: INFO
    cpf.xyz: DEBUG

cpf:
  cmn:
    business-db:
      # 교육 모듈에서 CMN 업무 공통 샘플을 바로 실행할 수 있도록 local 기본값은 활성화합니다.
      enabled: ${CPF_CMN_BUSINESS_DB_ENABLED:true}
  framework:
    module-id: XYZ
    was-id: ${WAS_ID:xyzAP01}

---
# prod에서는 교육 편의 기본값을 줄이고 운영자가 명시적으로 켠 경우에만 CMN 업무 DB를 사용합니다.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    xyz:
      url: ${XYZ_DB_URL}
      username: ${XYZ_DB_USERNAME}
      password: ${XYZ_DB_PASSWORD}

logging:
  level:
    cpf.xyz: INFO

cpf:
  cmn:
    business-db:
      enabled: ${CPF_CMN_BUSINESS_DB_ENABLED:false}
